{% extends "base.html" %}
{% set title = "Categories" %}

{% block content %}
  <div class="d-flex flex-wrap align-items-end justify-content-between gap-2 mb-3">
    <div>
      <div class="h3 mb-1">Categories</div>
      <div class="subtle">Keep your reporting clean with good categories.</div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-12 col-lg-5">
      <div class="card p-3">
        <div class="fw-semibold mb-2">Add category</div>
        <form method="post" action="{{ url_for('categories_new') }}" class="row g-2">
          <div class="col-12">
            <label class="form-label small subtle mb-1">Name</label>
            <input class="form-control" name="name" placeholder="e.g. Insurance">
          </div>
          <div class="col-12">
            <label class="form-label small subtle mb-1">Kind</label>
            <select class="form-select" name="kind">
              <option value="expense" selected>Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
          <div class="col-12 d-grid mt-2">
            <button class="btn btn-primary" type="submit">Add</button>
          </div>
        </form>
      </div>
    </div>

    <div class="col-12 col-lg-7">
      <div class="card p-3">
        <div class="fw-semibold mb-2">All categories</div>
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>Name</th>
                <th style="width: 140px;">Kind</th>
                <th style="width: 90px;"></th>
              </tr>
            </thead>
            <tbody>
              {% for c in categories %}
                <tr>
                  <td class="fw-semibold">{{ c.name }}</td>
                  <td><span class="pill">{{ c.kind }}</span></td>
                  <td class="text-end">
                    <form method="post" action="{{ url_for('categories_delete', category_id=c.id) }}" onsubmit="return confirm('Delete this category? Budgets will also be removed.');">
                      <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                    </form>
                  </td>
                </tr>
              {% else %}
                <tr><td colspan="3" class="text-center subtle py-4">No categories.</td></tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
